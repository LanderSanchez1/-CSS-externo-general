<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MediCitas Web - Iniciar sesión</title>

    <link rel="icon" type="image/png" href="./images/icono.png">

    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <img src="images/logo.svg" alt="Logo MediCitas" class="logo">
      <h1>MediCitas Web</h1>
    </div>
  </header>

  <main>
    <section id="form-container">
      <h2>Iniciar sesión</h2>
      <img src="images/icono.png" alt="Iniciar sesión" style="width: 80px; height: 80px; display: block; margin: 15px auto;">
      <form action="index.html" method="get" id="form-login">
        <label for="user">Usuario o correo electrónico</label>
        <input id="user" name="user" type="text" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" minlength="8" maxlength="16" required>

        <button type="submit">Ingresar</button>
      </form>

      <div id="enlace-alternativo">
        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        <p class="enlace-ayuda"><a href="#">¿Olvidaste tu contraseña?</a></p>
      </div>
    </section>
  </main>

  <footer>
    <p> 2026 MediCitas Web</p>
  </footer>
</body>
</html>
