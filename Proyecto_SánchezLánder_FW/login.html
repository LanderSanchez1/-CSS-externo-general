<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCitas Web - Iniciar sesión</title>
  <link rel="icon" type="image/png" href="./images/icono.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>
  <!-- Navbar con Bootstrap -->
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html" style="color: #0b5ea8 !important;">
        <img src="images/logo.svg" alt="Logo MediCitas" class="logo me-2" style="height: 40px;">
        <span class="fs-4" style="color: #0b5ea8 !important; opacity: 1 !important;">MediCitas Web</span>
      </a>
    </div>
  </nav>

  <main class="py-5 d-flex align-items-center" style="min-height: 80vh;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow">
            <div class="card-header bg-primary text-white">
              <h2 class="card-title mb-0 text-center"><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h2>
            </div>
            <div class="card-body">
              <form action="index.html" method="get" id="form-login">
                <div class="mb-3">
                  <label for="user" class="form-label">Usuario o correo electrónico</label>
                  <input class="form-control" id="user" name="user" type="text" placeholder="usuario@example.com"
                    required>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input class="form-control" id="password" name="password" type="password" minlength="8" maxlength="16"
                    required placeholder="Mínimo 8 caracteres">
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3"><i
                    class="fas fa-arrow-right me-2"></i>Ingresar</button>
              </form>

              <hr>

              <div class="text-center">
                <p class="mb-2">¿No tienes cuenta? <a href="register.html" class="text-primary fw-bold">Regístrate
                    aquí</a></p>
                <p class="small text-muted"><a href="#" class="text-muted">¿Olvidaste tu contraseña?</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-light border-top mt-5 py-4">
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <p class="mb-0"><strong>MediCitas Web</strong> - Gestión de Citas Médicas</p>
          <p class="text-muted small">© 2026 Proyecto de Lánder Sánchez</p>
        </div>
        <div class="col-md-6 text-md-end">
          <p class="text-muted small">
            <i class="fas fa-phone me-1"></i> +593 2 123 4567 |
            <i class="fas fa-envelope me-1"></i> info@medicitas.com
          </p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
